indices:
  sitemap:
    include:
      - /**
      - /**/**
    exclude:
      - /fragments/**
      - /fragments/**/**
      - /docs/**
      - /docs/**/**
      - /search
    target: /main/query-index.json
    properties:
      title:
        select: head > title
        value: |
          textContent(el)
      description:
        select: head > meta[name="description"]
        value: |
          attribute(el, "content")
      image:
        select: head > meta[property="og:image"]
        value: |
          match(attribute(el, "content"), "https:\/\/[^/]+(/.*)")
      template:
        select: head > meta[name="template"]
        value: |
          attribute(el, "content")
      lastModified:
        select: none
        value: |
          parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')
  recipes:
    include:
      - /recipes/**
      - /recipes/**/**
    target: /recipes/query-index.json
    filter:
      template: recipe
    properties:
      title:
        select: main h1:first-of-type
        value: |
          textContent(el)
      description:
        select: head > meta[name="description"]
        value: |
          attribute(el, "content")
      image:
        select: head > meta[property="og:image"]
        value: |
          match(attribute(el, "content"), "https:\/\/[^/]+(/.*)")
      category:
        select: head > meta[name="category"]
        value: |
          attribute(el, "content")
      world:
        select: head > meta[name="world"]
        value: |
          attribute(el, "content")
      difficulty:
        select: head > meta[name="difficulty"]
        value: |
          attribute(el, "content")
      cook-time:
        select: head > meta[name="cook-time"]
        value: |
          attribute(el, "content")
      servings:
        select: head > meta[name="servings"]
        value: |
          attribute(el, "content")
      template:
        select: head > meta[name="template"]
        value: |
          attribute(el, "content")
      lastModified:
        select: none
        value: |
          parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')
