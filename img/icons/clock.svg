<svg id="clock" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
  <!-- Clock face -->
  <circle cx="10" cy="10" r="8.25" fill="none" stroke="#c4a070" stroke-width="1.5"/>
  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="10" y1="2.5"  x2="10" y2="4"    stroke="#c4a070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17.5" y1="10" x2="16" y2="10"   stroke="#c4a070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="17.5" x2="10" y2="16"   stroke="#c4a070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2.5" y1="10"  x2="4"  y2="10"   stroke="#c4a070" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="10" y1="10" x2="7" y2="6.5" stroke="#c4a070" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~12) -->
  <line x1="10" y1="10" x2="10" y2="4.5" stroke="#c4a070" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="10" cy="10" r="1.2" fill="#c4a070"/>
</svg>
