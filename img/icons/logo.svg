<svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Таверна Відьмака">

  <!-- Dark medallion background -->
  <circle cx="24" cy="24" r="23.5" fill="#1a1108"/>

  <!-- Outer gold ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#c89028" stroke-width="2"/>

  <!-- Inner decorative ring -->
  <circle cx="24" cy="24" r="18.5" fill="none" stroke="#c89028" stroke-width="0.6" opacity="0.45"/>

  <!-- Diamond ornaments on outer ring (N / S / E / W) -->
  <polygon points="24,3.5 25.5,5 24,6.5 22.5,5"   fill="#c89028"/>
  <polygon points="24,41.5 25.5,43 24,44.5 22.5,43" fill="#c89028"/>
  <polygon points="3.5,24 5,25.5 6.5,24 5,22.5"    fill="#c89028"/>
  <polygon points="41.5,24 43,25.5 44.5,24 43,22.5" fill="#c89028"/>

  <!-- ── Fork (rotated -32°) ─────────────────────── -->
  <g transform="rotate(-32, 24, 24)" fill="#c89028">
    <!-- Three tines -->
    <rect x="21"   y="11" width="1.3" height="8.5" rx="0.65"/>
    <rect x="23.4" y="11" width="1.3" height="8.5" rx="0.65"/>
    <rect x="25.7" y="11" width="1.3" height="8.5" rx="0.65"/>
    <!-- Neck (joins tines to handle) -->
    <path d="M21 19.5 C20.5 21.5 22 22.5 24 22.5 C26 22.5 27.5 21.5 27 19.5 Z"/>
    <!-- Handle -->
    <rect x="23" y="22.5" width="2" height="14" rx="1"/>
  </g>

  <!-- ── Dagger (rotated +32°) ──────────────────── -->
  <g transform="rotate(32, 24, 24)" fill="#c89028">
    <!-- Blade -->
    <path d="M24 10.5 L21.5 21.5 L26.5 21.5 Z"/>
    <!-- Blade fuller (ridge line for detail) -->
    <line x1="24" y1="13" x2="24" y2="21" stroke="#1a1108" stroke-width="0.6" opacity="0.6"/>
    <!-- Crossguard -->
    <rect x="19.5" y="21.5" width="9" height="2" rx="1"/>
    <!-- Handle / grip -->
    <rect x="23" y="23.5" width="2" height="11" rx="1"/>
    <!-- Pommel -->
    <circle cx="24" cy="37" r="2.2"/>
  </g>

</svg>
